<style>
.im-wrapper { 
    font-family: 'Inter', sans-serif; 
    background: #fff; 
    border-radius: 24px; 
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
    overflow: hidden; 
    max-width: 450px; 
    margin: 0 auto; 
    border: 1px solid #e2e8f0; 
    width: 100%; 
    box-sizing: border-box; 
} 
.im-header { 
    padding: 24px; 
    text-align: center; 
    color: white; 
    transition: background 0.3s ease; 
} 
.im-logo { 
    max-height: 48px; 
    margin: 0 auto 12px auto; 
    display: block; 
    object-fit: contain; 
} 
.im-title { 
    margin: 0; 
    font-size: 20px; 
    font-weight: 700; 
    line-height: 1.3; 
} 
.im-body { 
    padding: 24px; 
} 
.im-group { 
    margin-bottom: 16px; 
} 
.im-label { 
    display: block; 
    font-size: 13px; 
    font-weight: 700; 
    color: #475569; 
    margin-bottom: 6px; 
} 
.im-input { 
    width: 100%; 
    padding: 12px 16px; 
    background: #f8fafc; 
    border: 1px solid #cbd5e1; 
    border-radius: 12px; 
    font-size: 14px; 
    box-sizing: border-box; 
    transition: all 0.2s; 
    color: #0f172a; 
} 
.im-input:focus { 
    outline: none; 
    border-color: #cfae07; 
    box-shadow: 0 0 0 3px rgba(207, 174, 7,0.1); 
    background: #fff; 
} 
.im-radio-group, .im-checkbox-group { 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    margin-top: 8px; 
} 
.im-radio-label, .im-checkbox-label { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-size: 14px; 
    color: #334155; 
    cursor: pointer; 
    padding: 8px 12px; 
    background: #f8fafc; 
    border: 1px solid #e2e8f0; 
    border-radius: 10px; 
    transition: background 0.2s; 
} 
.im-radio-label:hover, .im-checkbox-label:hover { 
    background: #f1f5f9; 
} 
.im-radio-label input, .im-checkbox-label input { 
    accent-color: #cfae07; 
    width: 16px; 
    height: 16px; 
    cursor: pointer; 
} 
.im-footer { 
    margin-top: 24px; 
} 
.im-total-box { 
    display: none; 
    justify-content: space-between; 
    align-items: center; 
    padding: 16px; 
    background: #f8fafc; 
    border: 2px dashed #cbd5e1; 
    border-radius: 12px; 
    margin-bottom: 16px; 
} 
.im-total-label { 
    font-size: 13px; 
    font-weight: 700; 
    color: #475569; 
} 
.im-total-value { 
    font-size: 18px; 
    font-weight: 800; 
    color: #cfae07; 
} 
.im-trust { 
    display: flex; 
    gap: 12px; 
    padding: 12px 16px; 
    background: rgba(207, 174, 7, 0.08); 
    border: 1px solid rgba(207, 174, 7, 0.2); 
    border-radius: 12px; 
    margin-bottom: 16px; 
    align-items: flex-start; 
} 
.im-trust-title { 
    font-size: 13px; 
    font-weight: 700; 
    color: #cfae07; 
    line-height: 1.2; 
} 
.im-trust-desc { 
    font-size: 11px; 
    color: #64748b; 
    margin-top: 4px; 
    line-height: 1.4; 
} 
.im-btn { 
    width: 100%; 
    padding: 14px; 
    border: none; 
    border-radius: 12px; 
    color: white; 
    font-weight: 700; 
    font-size: 15px; 
    cursor: pointer; 
    transition: all 0.2s; 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
} 
.im-btn:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
}
.im-timer-wrap { text-align: center; margin-bottom: 12px; }
.im-timer { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 700; font-size: 14px; color: #cfae07; background: rgba(207, 174, 7, 0.1); padding: 8px 16px; border-radius: 99px; }
.im-error-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 999999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 16px; }
.im-error-modal.im-show { opacity: 1; pointer-events: auto; }
.im-error-box { background: white; padding: 24px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.im-error-modal.im-show .im-error-box { transform: scale(1); }
.im-error-icon { width: 56px; height: 56px; background: #fee2e2; color: #e11d48; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.im-error-title { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 8px; line-height: 1.2; }
.im-error-desc { font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
.im-error-btn { width: 100%; padding: 12px; background: #e11d48; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s; font-size: 14px;}
.im-error-btn:hover { background: #be123c; }

.im-trigger-btn { 
    padding: 16px 32px; 
    border-radius: 12px; 
    font-weight: bold; 
    color: white; 
    border: none; 
    cursor: pointer; 
    font-size: 16px; 
    background: linear-gradient(135deg, #cfae07, #ecdb6f); 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
}
.im-overlay { 
    position: fixed; 
    inset: 0; 
    background: rgba(15,23,42,0.6); 
    backdrop-filter: blur(4px); 
    z-index: 99999; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    opacity: 0; 
    pointer-events: none; 
    transition: opacity 0.3s ease; 
    padding: 16px; 
}
.im-overlay.im-show { 
    opacity: 1; 
    pointer-events: auto; 
}
.im-modal { 
    transform: translateY(20px); 
    transition: transform 0.3s ease; 
    width: 100%; 
    max-width: 450px; 
    position: relative; 
}
.im-overlay.im-show .im-modal { 
    transform: translateY(0); 
}
.im-close { 
    position: absolute; 
    top: -12px; 
    right: -12px; 
    background: white; 
    color: #0f172a; 
    width: 32px; 
    height: 32px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-weight: bold; 
    cursor: pointer; 
    border: none; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    z-index: 10; 
    font-family: Arial; 
    font-size: 16px; 
}

</style>

<button class="im-trigger-btn" onclick="document.getElementById('im-overlay').classList.add('im-show')"><span style="color: #ffffff;
